version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: news_postgres
    environment:
      POSTGRES_DB: newsdb
      POSTGRES_USER: newsuser
      POSTGRES_PASSWORD: newspass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsuser -d newsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: news_api
    environment:
      DATABASE_URL: postgresql+psycopg2://newsuser:newspass@postgres:5432/newsdb
      NEWS_API_KEY: news-api-key-2026
      PORT: 8000
      INGEST_SOURCES: sec_edgar,google_news,yahoo_finance,seeking_alpha
      DEFAULT_DAYS: 3
      USER_AGENT: "news_service/1.0 (contact: 1909874106@qq.com)"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
